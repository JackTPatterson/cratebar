name: Release

# Push a version tag to cut a release, e.g.:
#   git tag v1.1 && git push origin v1.1
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  release:
    runs-on: macos-14
    env:
      # Whether the optional tap-bump step can run (secret present?).
      HAS_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode (Swift 6)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .app bundle
        run: ./Scripts/build-app.sh

      - name: Package & checksum
        id: pkg
        run: |
          cd build
          ZIP="Cratebar-${{ steps.ver.outputs.version }}.zip"
          ditto -c -k --keepParent Cratebar.app "$ZIP"
          SHA=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          echo "zip=build/$ZIP" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          {
            echo "### Cratebar ${{ steps.ver.outputs.version }}"
            echo "\`$ZIP\` sha256: \`$SHA\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.zip }}
          generate_release_notes: true
          body: |
            ### Install via Homebrew
            ```
            brew tap JackTPatterson/tap
            brew install --cask cratebar
            ```
            This also installs the required `yt-dlp` and `ffmpeg`.

            The app is ad-hoc signed (not notarized); on first launch right-click → **Open**,
            or run `xattr -dr com.apple.quarantine /Applications/Cratebar.app`.

      - name: Bump Homebrew cask in tap
        if: ${{ env.HAS_TAP_TOKEN == 'true' }}
        env:
          TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA: ${{ steps.pkg.outputs.sha }}
        run: |
          git clone "https://x-access-token:${TOKEN}@github.com/JackTPatterson/homebrew-tap.git" tap
          cd tap
          CASK="Casks/cratebar.rb"
          /usr/bin/sed -i '' -E "s/^  version \"[^\"]+\"/  version \"${VERSION}\"/" "$CASK"
          /usr/bin/sed -i '' -E "s/^  sha256 \"[^\"]+\"/  sha256 \"${SHA}\"/" "$CASK"
          if git diff --quiet; then
            echo "Cask already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "cratebar ${VERSION}"
          git push

      - name: Tap bump skipped (no token)
        if: ${{ env.HAS_TAP_TOKEN != 'true' }}
        run: |
          echo "::notice::HOMEBREW_TAP_TOKEN not set — release created, but the cask was not"
          echo "::notice::auto-bumped. Update Casks/cratebar.rb manually with version"
          echo "::notice::${{ steps.ver.outputs.version }} and sha256 ${{ steps.pkg.outputs.sha }}."
